name: AppSecAI Security Analysis

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PROCESSING_MODE: group_cc
      AUTO_CREATE_PRS: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AppSecAI Vulnerability Analysis
        uses: AppSecureAI/automation-action@v1
        with:
          files: |
            sarif/CVE-2023-28709.sarif
            sarif/CVE-2023-34981.sarif
            sarif/CVE-2023-45648.sarif
            sarif/CVE-2024-24549.sarif
            sarif/CVE-2024-38286.sarif
            sarif/CVE-2024-52316.sarif
            sarif/CVE-2024-52317.sarif
            sarif/CVE-2024-52318.sarif
            sarif/CVE-2024-54677.sarif
            sarif/CVE-2025-24813.sarif
            sarif/CVE-2025-31650.sarif
            sarif/CVE-2025-48988.sarif
            sarif/CVE-2025-48989.sarif
            sarif/CVE-2025-52520.sarif
            sarif/CVE-2025-55668.sarif
            sarif/CVE-2025-61795.sarif
            sarif/CVE-2025-66614.sarif
            sarif/CVE-2026-24733.sarif
            sarif/CVE-2026-25854.sarif
            sarif/CVE-2026-29129.sarif
            sarif/CVE-2026-29145.sarif
            sarif/CVE-2026-29146.sarif
            sarif/CVE-2026-34487.sarif
            sarif/CVE-2026-41284.sarif
            sarif/CVE-2026-43513.sarif
            sarif/CVE-2026-43514.sarif
