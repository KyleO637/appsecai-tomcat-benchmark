name: AppSecAI Security Analysis

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PROCESSING_MODE: group_cc
      AUTO_CREATE_PRS: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AppSecAI Vulnerability Analysis
        uses: AppSecureAI/automation-action@v1
        with:
          files: |
            sarif/CVE-2023-41080.sarif
            sarif/CVE-2026-34483.sarif
            sarif/CVE-2026-24880.sarif
