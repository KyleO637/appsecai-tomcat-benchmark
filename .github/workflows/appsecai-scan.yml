name: AppSecAI Security Analysis

on:
  workflow_dispatch:
    inputs:
      cve_id:
        description: 'CVE to run (e.g. CVE-2023-28709). Must exist in pipeline_data/cve_candidates.json.'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PROCESSING_MODE: group_cc
      AUTO_CREATE_PRS: 'true'
      CVE_ID: ${{ inputs.cve_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate fix markdown via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_markdown.py \
            --cve-id "$CVE_ID" \
            --candidates pipeline_data/cve_candidates.json \
            --fixes-dir fixes \
            --tomcat-repo https://github.com/apache/tomcat.git

      - name: Generate SARIF from markdown
        run: |
          python scripts/sarif_generator.py \
            --fixes-dir fixes \
            --sarif-dir sarif

      - name: AppSecAI Vulnerability Analysis
        uses: AppSecureAI/automation-action@v1
        with:
          files: sarif/${{ inputs.cve_id }}.sarif

      - name: Update runs log
        if: success()
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import date
          from pathlib import Path

          runs_path = Path('pipeline_data/appsecai_runs.json')
          runs = json.loads(runs_path.read_text())

          cve_id = os.environ['CVE_ID']
          today = date.today().isoformat()

          if cve_id not in runs:
              runs[cve_id] = {'submitted_to_appsecai': True, 'runs': []}

          runs[cve_id]['submitted_to_appsecai'] = True
          runs[cve_id].setdefault('runs', []).append({
              'pr_created': None,
              'date': today,
              'system_version': None,
              'triage_result': None,
          })

          runs_path.write_text(json.dumps(runs, indent=2) + '\n')
          print(f"Appended run for {cve_id} on {today}")
          PYEOF

      - name: Organize benchmark data
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/organize_benchmark.py \
            --cve-id "$CVE_ID" \
            --fixes-dir fixes \
            --candidates pipeline_data/cve_candidates.json \
            --benchmark-dir benchmark \
            --repo "${{ github.repository }}"

      - name: Commit generated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixes/ sarif/ pipeline_data/appsecai_runs.json benchmark/
          git diff --cached --quiet || git commit -m "chore: add generated files for $CVE_ID [skip ci]"
          git pull --rebase origin main
          git push
