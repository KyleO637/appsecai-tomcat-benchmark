name: AppSecAI Security Analysis

on:
  workflow_dispatch:
    inputs:
      cve_id:
        description: 'Single CVE to submit (e.g. CVE-2023-28709). Leave blank to submit all pending.'
        required: false
        default: ''
  workflow_call:
    inputs:
      cve_id:
        description: 'Single CVE to submit. Leave blank to submit all pending.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PROCESSING_MODE: group_cc
      AUTO_CREATE_PRS: 'true'
      CVE_FILTER: ${{ inputs.cve_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate pending SARIF file list
        id: generate-list
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          runs = json.loads(Path('pipeline_data/appsecai_runs.json').read_text())
          cve_filter = os.environ.get('CVE_FILTER', '').strip()

          if cve_filter:
              if cve_filter not in runs:
                  print(f"ERROR: {cve_filter} not found in appsecai_runs.json")
                  raise SystemExit(1)
              if runs[cve_filter]['submitted_to_appsecai']:
                  print(f"{cve_filter} already submitted — nothing to do.")
                  pending = []
              else:
                  pending = [f"sarif/{cve_filter}.sarif"]
          else:
              pending = [
                  f"sarif/{cve}.sarif"
                  for cve, v in runs.items()
                  if not v['submitted_to_appsecai']
              ]

          if not pending:
              print("No pending CVEs — nothing to submit.")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("sarif_files<<EOF\n")
              f.write("\n".join(pending) + "\n")
              f.write("EOF\n")
              f.write(f"pending_cves={','.join(cve.split('/')[1].replace('.sarif','') for cve in pending)}\n")

          print(f"Pending CVEs ({len(pending)}): {[p.split('/')[1].replace('.sarif','') for p in pending]}")
          PYEOF

      - name: AppSecAI Vulnerability Analysis
        if: steps.generate-list.outputs.sarif_files != ''
        uses: AppSecureAI/automation-action@v1
        with:
          files: ${{ steps.generate-list.outputs.sarif_files }}

      - name: Mark submitted CVEs in runs log
        if: success() && steps.generate-list.outputs.pending_cves != ''
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import date
          from pathlib import Path

          runs_path = Path('pipeline_data/appsecai_runs.json')
          runs = json.loads(runs_path.read_text())

          submitted = os.environ['PENDING_CVES'].split(',')
          today = date.today().isoformat()

          for cve in submitted:
              if cve in runs:
                  runs[cve]['submitted_to_appsecai'] = True
                  runs[cve]['date_run'] = today

          runs_path.write_text(json.dumps(runs, indent=2) + '\n')
          print(f"Marked {len(submitted)} CVEs as submitted on {today}: {submitted}")
          PYEOF
        env:
          PENDING_CVES: ${{ steps.generate-list.outputs.pending_cves }}

      - name: Commit updated runs log
        if: success() && steps.generate-list.outputs.pending_cves != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline_data/appsecai_runs.json
          git diff --cached --quiet || git commit -m "chore: mark $(echo $PENDING_CVES | tr ',' '\n' | wc -l | tr -d ' ') CVEs as submitted [skip ci]"
          git pull --rebase origin main
          git push
        env:
          PENDING_CVES: ${{ steps.generate-list.outputs.pending_cves }}
